---
- name: Install AUR packages
  kewlfft.aur.aur:
    use: yay
    name:
      - urxvt-resize-font-git
      - light-git
      - ttf-ms-fonts
      - numix-icon-theme-git
    state: present
  become: true
  become_user: aur_builder

- name: Install AUR packages needed for DWM
  kewlfft.aur.aur:
    use: yay
    name:
      - pa-applet-git
      - syncthingtray
    state: present
  become: true
  become_user: aur_builder
